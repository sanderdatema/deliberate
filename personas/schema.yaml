required_fields:
  - name
  - model
  - domains
  - role
  - reasoning_style
  - forbidden
  - focus
  - output_format
  - system_prompt

model_values:
  - opus
  - sonnet

role_values:
  - analyst
  - editor

analyst_output_format:
  - position
  - confidence
  - evidence
  - challenges
  - questions

editor_output_format:
  - blind_spots
  - synthesis
  - question_shifts
  - mechanisms

domains_constraints:
  min_items: 1
  item_type: string

constraints:
  min_forbidden_items: 2
  system_prompt_must_contain:
    - "FORBIDDEN"
    - "MUST NOT"
  system_prompt_must_contain_format: "FORMAT YOUR RESPONSE"
