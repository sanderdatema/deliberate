[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "deliberators"
version = "0.7.0"
description = "Multi-perspective AI deliberation team — Claude Code skill"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Sander van Harmelen" },
]
keywords = ["ai", "deliberation", "claude-code", "multi-perspective"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "fastapi>=0.115.0",
    "httpx>=0.28.0",
    "pyyaml>=6.0.3",
    "uvicorn[standard]>=0.34.0",
]

[project.scripts]
deliberators = "deliberators.__main__:main"

[project.optional-dependencies]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=0.25.0",
]

[tool.hatch.build.targets.wheel]
packages = ["deliberators"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
